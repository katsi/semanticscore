# -----------------------------------------------------------------------
# STEP 1 (first deploy only): this config serves HTTP and handles the
# ACME challenge so certbot can issue the certificate.
# Run:  make ssl-init   then   make ssl-enable
# -----------------------------------------------------------------------

server {
    listen 80;
    server_name knowledge.semanticscore.net;

    # Required for certbot domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Before cert exists: proxy HTTP directly.
    # After running ssl-enable this block is replaced by a redirect.
    location / {
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

